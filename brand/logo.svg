<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nyx">
  <defs>
    <linearGradient id="nyxBrand" x1="40" y1="40" x2="216" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D28D9"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="nyxGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <mask id="crescent">
      <rect width="256" height="256" fill="black"/>
      <circle cx="128" cy="128" r="66" fill="white"/>
      <circle cx="158" cy="112" r="60" fill="black"/>
    </mask>
  </defs>

  <!-- disco noturno -->
  <circle cx="128" cy="128" r="120" fill="#0B0A12"/>
  <circle cx="128" cy="128" r="119" fill="none" stroke="#141221" stroke-width="2"/>

  <!-- brilho ambiente -->
  <circle cx="128" cy="128" r="110" fill="url(#nyxGlow)"/>

  <!-- lua crescente -->
  <g mask="url(#crescent)">
    <rect width="256" height="256" fill="url(#nyxBrand)"/>
  </g>

  <!-- estrelas -->
  <circle cx="182" cy="70" r="3" fill="#EDEDF7"/>
  <circle cx="200" cy="120" r="2" fill="#C7C9E0"/>
  <circle cx="70" cy="188" r="2.5" fill="#E8C468"/>
  <circle cx="92" cy="64" r="1.6" fill="#C7C9E0"/>
</svg>
